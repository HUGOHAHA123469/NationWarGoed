name: Build NationWar
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn package -B
      - uses: actions/upload-artifact@v3
        with:
          name: NationWar
          path: target/NationWar.jar
